<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart XPath Generator</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <div class="popup-header">
      <span class="popup-icon">⚡</span>
      <span class="popup-title">Smart XPath</span>
    </div>

    <div class="popup-body">
      <p class="popup-desc">Click to generate smart, stable XPath selectors for any element.</p>

      <button id="toggle-btn" class="toggle-btn">
        <span class="toggle-icon" id="toggle-icon">🎯</span>
        <span id="toggle-text">Enable Selector Mode</span>
      </button>

      <!-- <div class="shortcut-hint">
        <kbd>Alt</kbd> + <kbd>Shift</kbd> + <kbd>X</kbd> to toggle
      </div> -->
    </div>

    <div class="popup-footer">
      v1.0.0 · Press <kbd>ESC</kbd> to exit
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
